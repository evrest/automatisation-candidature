# fly.toml app configuration file generated for backend-unfurling-waterfall-7182 on 2026-06-07T16:49:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-unfurling-waterfall-7182'
primary_region = 'cdg'

[build]

# Variables d'env publiques. Les secrets (CORS_ORIGINS, futures clés API)
# se mettent avec : fly secrets set KEY=value
[env]
  DATABASE_URL = "sqlite:////data/dev.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Volume persistant pour SQLite. SQLite = 1 SEULE machine, sinon données divergent.
[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
